services:
  # After changing Python API code (e.g. live ingestion), rebuild: docker compose build api && docker compose up -d api
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"
    environment:
      - AMA_DBT_PROJECT_DIR=/app/dbt_project
      - AMA_OUTPUT_DIR=/app/dbt_project/models/ama_generated
      - AMA_CHECKPOINT_DIR=/app/dbt_project/target/checkpoints
      - AMA_OPENAI_API_KEY=${AMA_OPENAI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AMA_SCHEMA_MODE=${AMA_SCHEMA_MODE:-file}
      - AMA_DB_CONNECTION_STRING=${AMA_DB_CONNECTION_STRING:-}
      - AMA_DB_TIMEOUT=${AMA_DB_TIMEOUT:-10}
      - AMA_ENCRYPTION_KEY=${AMA_ENCRYPTION_KEY:-}
      - AMA_MANIFEST_PATH=${AMA_MANIFEST_PATH:-ddl_manifest.json}
    volumes:
      - ./sample_data:/app/sample_data:ro
      - ./dbt_project:/app/dbt_project
      # Live connection UI writes here; without this mount, files only exist inside the container.
      - ./live_data:/app/live_data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ./frontend
      dockerfile: ../docker/web.Dockerfile
      args:
        - VITE_AMA_API_BASE=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    # After pulling or editing frontend files, either rebuild (`docker compose build web && docker compose up -d web`)
    # or run with watch: `docker compose watch` (rebuilds this service when ./frontend sources change).
    develop:
      watch:
        - path: ./frontend/src
          action: rebuild
        - path: ./frontend/index.html
          action: rebuild
        - path: ./frontend/vite.config.ts
          action: rebuild
        - path: ./frontend/package.json
          action: rebuild

